<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>Unload Tabs</h2>
  <div id="stats">
    <span id="stat-loaded">Loading...</span>
  </div>
  <div class="options">
    <label><input type="checkbox" id="skipPinned" checked> Skip pinned tabs</label>
    <label><input type="checkbox" id="allWindows"> Include all windows</label>
  </div>
  <button id="unloadBtn" disabled>Unload Inactive Tabs</button>
  <div id="result"></div>
  <script src="../lib/tab-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
